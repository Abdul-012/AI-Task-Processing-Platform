name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  IMAGE_TAG: sha-${{ github.sha }}

jobs:
  backend:
    name: Backend lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  worker:
    name: Worker lint and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: worker/requirements-dev.txt
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: ruff check .
      - run: pytest

  build-and-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend, worker]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            context: backend
            image: ai-task-backend
          - service: worker
            context: worker
            image: ai-task-worker
          - service: frontend
            context: frontend
            image: ai-task-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: |
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:${{ env.IMAGE_TAG }}
            docker.io/${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=${{ matrix.service }}

  update-infra:
    name: Update GitOps image tags
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v4
        with:
          path: app

      - name: Checkout infrastructure repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.INFRA_REPOSITORY }}
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update kustomize image tags
        run: node app/scripts/update-infra-tags.mjs
        env:
          INFRA_PATH: infra
          DEPLOY_ENV: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
          IMAGE_REGISTRY: docker.io/${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}

      - name: Commit and push infra change
        working-directory: infra
        run: |
          if git diff --quiet; then
            echo "No image tag changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add overlays
          git commit -m "chore: deploy $IMAGE_TAG"
          git push
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
